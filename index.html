<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>multiplayer-game</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        font: 14px system-ui, sans-serif;
        color: #ddd;
      }
      #view { width: 960px; height: 384px; display: block; background: #000; }
      #hint {
        position: fixed; bottom: 12px; left: 0; right: 0;
        text-align: center; color: #888; font: 13px system-ui, sans-serif;
      }
      #hp-hud {
        position: fixed; top: 12px; left: 0; right: 0;
        text-align: center; color: #ddd; font: 13px system-ui, sans-serif;
      }
      #winner {
        position: fixed; top: 40%; left: 0; right: 0;
        text-align: center; color: #fff; font: bold 28px system-ui, sans-serif;
        display: none;
      }
      #solar {
        position: fixed; top: 12px; left: 12px;
        color: #ffd700; font: bold 16px system-ui, sans-serif;
      }

      #lobby { width: 360px; }
      #lobby button { cursor: pointer; }
      #lobby button[aria-pressed="true"] { outline: 2px solid #4bd17c; }
      #landing { display: flex; flex-direction: column; gap: 12px; }
      #join-row { display: flex; gap: 8px; }
      #join-code { flex: 1; text-transform: uppercase; }

      #room-code { font-size: 1.4em; letter-spacing: 0.15em; }
      #player-list { list-style: none; margin: 0; padding: 0; }
      #player-list li { padding: 4px 0; border-bottom: 1px solid #333; }
      #player-list li.you { color: #4bd17c; }
      .picker { display: flex; gap: 8px; margin: 8px 0; }
      #ready-toggle { margin-top: 12px; }

      #dev-panel { position: fixed; bottom: 12px; right: 12px; font: 13px system-ui, sans-serif; }
      #dev-panel-tab {
        cursor: pointer; background: #222; color: #ddd; border: 1px solid #444;
        border-radius: 4px; padding: 4px 10px;
      }
      #dev-panel-body:not([hidden]) {
        margin-bottom: 8px; padding: 10px; background: #1a1a1a; border: 1px solid #444;
        border-radius: 4px; display: flex; flex-direction: column; gap: 8px;
      }
      #dev-panel-body button { cursor: pointer; }
      #dev-panel-body button:disabled { cursor: default; opacity: 0.5; }
    </style>
  </head>
  <body>
    <div id="lobby">
      <div id="landing">
        <button id="create-room">Create Room</button>
        <div id="join-row">
          <input id="join-code" placeholder="Room code" maxlength="4" />
          <button id="join-room">Join Room</button>
        </div>
        <p id="landing-error" role="alert"></p>
      </div>
      <div id="room" hidden>
        <p>Room code: <strong id="room-code"></strong></p>
        <ul id="player-list"></ul>
        <div id="team-picker" class="picker"></div>
        <div id="character-picker" class="picker"></div>
        <button id="ready-toggle" disabled>Ready</button>
        <p id="room-error" role="alert"></p>
      </div>
    </div>
    <canvas id="view" hidden></canvas>
    <div id="hint" hidden>Arrows/WASD to move, Up/W/Space to jump, F to fire, Shift to dash, E/R to buy a damage/speed Upgrade at your own Base &middot; open a second window to see it synced</div>
    <div id="solar" hidden>Solar: <span id="solar-amount">0</span></div>
    <div id="hp-hud" hidden></div>
    <div id="dev-panel" hidden>
      <div id="dev-panel-body" hidden>
        <button id="dev-panel-jump">Jump to Game</button>
      </div>
      <button id="dev-panel-tab">DEV</button>
    </div>
    <div id="winner"></div>
    <script type="module" src="/client/client.js"></script>
  </body>
</html>
